name: Deploy dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-dashboard-pages.yml
      - outputs/dashboard/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp outputs/dashboard/abs_catcher_dashboard.html public/index.html
          cp outputs/dashboard/abs_catcher_dashboard.html public/abs_catcher_dashboard.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
